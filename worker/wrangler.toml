name = "luffytv-proxy"
main = "luffytv-proxy.js"
compatibility_date = "2024-09-01"
workers_dev = true

# Free tier: 100,000 requests/day, 10ms CPU per request
# This worker is well within those limits — pure I/O, minimal CPU.

# Optional: custom domain
# Uncomment and set your domain in Cloudflare dashboard first
# [routes]
# route = "proxy.luffytv.example.com/*"
# zone_name = "luffytv.example.com"

# Optional: KV namespace for persistent caching (instead of default edge cache)
# [[kv_namespaces]]
# binding = "IMAGE_CACHE"
# id = "your-kv-namespace-id"
