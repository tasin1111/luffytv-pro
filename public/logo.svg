<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <linearGradient id="ltvGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#FF8E53"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <filter id="ltvGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Play icon (triangle) in gradient circle -->
  <circle cx="20" cy="20" r="16" fill="url(#ltvGrad)" filter="url(#ltvGlow)"/>
  <path d="M15 13 L15 27 L27 20 Z" fill="#ffffff"/>
  <!-- "LuffyTV" text -->
  <text x="44" y="27" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" font-style="italic" fill="#ffffff" letter-spacing="-0.5">LuffyTV</text>
</svg>
